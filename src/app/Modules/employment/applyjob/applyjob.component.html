<section class="apply my-md-4 my-3">
  <div class="w-75 mx-auto">
    <div class="row w-100 mx-auto g-3 justify-content-center">
      <div class="col-12">
        <img
          src="../../../../assets/images/blogdetails.jpg"
          class="w-100"
          alt=""
        />
      </div>

      <div class="col-md-8 form-container p-md-3 mt-4">
        <div class="content">
          <span>
            <i
              [ngClass]="currentLang === 'ar' ? 'ms-2' : 'me-2'"
              class="fa-regular fa-calendar"
            ></i>
            {{ job.created_at | date }}
          </span>
          <span class="mx-1">
            <i
              [ngClass]="currentLang === 'ar' ? 'ms-2' : 'me-2'"
              class="fa-regular mx-3 fa-calendar"
            ></i>
            {{ job.end_time | date }}
          </span>

          <h1>
            {{ job.job_title_name }}
          </h1>
        </div>
        <form class="mt-3">
          <div class="form-row">
            <input
              type="text"
              class="form-control"
              placeholder="{{ 'name' | translate }}"
              formControlName="name"
              required
            />
            <input
              type="text"
              class="form-control"
              placeholder="{{ 'phone' | translate }}"
              formControlName="phone"
              required
            />
          </div>
          <div class="form-row">
            <input
              type="email"
              class="form-control"
              placeholder="{{ 'email' | translate }}"
              formControlName="email"
              required
            />
            <input
              type="text"
              class="form-control"
              placeholder="{{ 'experience' | translate }}"
              formControlName="experience"
              required
            />
          </div>
          <div class="form-row">
            <input
              type="url"
              class="form-control"
              placeholder="{{ 'github' | translate }}"
              formControlName="github"
            />
            <input
              type="url"
              class="form-control"
              placeholder="{{ 'linkedin' | translate }}"
              formControlName="linkedin"
            />
          </div>
          <div class="form-row">
            <input
              type="number"
              class="form-control"
              placeholder="{{ 'salary' | translate }}"
              formControlName="salary"
            />
            <input
              type="text"
              class="form-control"
              placeholder="{{ 'notice_period' | translate }}"
              formControlName="notice_period"
            />
          </div>
          <textarea
            class="form-control textarea"
            placeholder="{{ 'about_you' | translate }}"
            formControlName="about_you"
            rows="4"
          ></textarea>
          <button type="submit" class="btn-submit mt-3">
            {{ "submit" | translate }}
          </button>
        </form>
      </div>
    </div>
  </div>
</section>
