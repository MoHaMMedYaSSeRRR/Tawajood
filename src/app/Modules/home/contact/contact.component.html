<section class="contact mt-md-4 mt-3 p-md-5 py-3">
  <div class="w-75 mx-auto">
    <h2 [ngClass]="currentLang === 'ar' ? 'text-end' : 'text-start'">
{{"contact_us"|translate}}    </h2>
    <div class="row mt-2 w-100 mx-auto justify-content-between">
      <div class="col-md-7">
        <div class="form">
          <form>
            <div
              
              class="row g-4 w-100 mx-auto"
            >
              <div class="col-6">
                <input [ngClass]="currentLang === 'ar' ? 'text-end' : 'text-start'"
                  type="email"
                  [placeholder]="'email' | translate"
                  class="form-control"
                  id="email"
                  required
                />
              </div>
              <div class="col-6">
                <input [ngClass]="currentLang === 'ar' ? 'text-end' : 'text-start'"
                  type="text"
                  [placeholder]="'name' | translate"
                  class="form-control"
                  id="name"
                  required
                />
              </div>
              <div class="col-6">
                <input [ngClass]="currentLang === 'ar' ? 'text-end' : 'text-start'"
                  type="service"
                  class="form-control"
                  id="service"
                  required
                  [placeholder]="'service' | translate"
                />
              </div>

              <div class="col-6">
                <!-- <div class="input-wrpper position-relative">
                  <select class="position-absolute" name="countrycode" id="country">
                 <option  *ngFor="let item of countries" [value]="item.code">
                      {{item.code}}
                    </option>
                  </select> -->
                  <input [ngClass]="currentLang === 'ar' ? 'text-end' : 'text-start'"
                  type="phone"
                  [placeholder]="'phone' | translate"
                  class="form-control"
                  id="phone"
                  required
                />
                
                <!-- </div>  -->
              </div>
              <div class="col-12">
                <textarea
                [ngClass]="currentLang === 'ar' ? 'text-end' : 'text-start'"
                [placeholder]="'message' | translate"
                  class="form-control"
                  id="message"
                  rows="3"
                  required
                ></textarea>
              </div>
              <div class="">
                <button type="submit">
                  {{ "submit" | translate }}
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
      <div *ngIf="" class="col-md-4">
        <div
          class="item d-flex align-items-center"
          [ngClass]="currentLang === 'ar' ? 'text-end' : 'text-start'"
        >
          <div class="item_content">
            <p class="mb-0">اتصل بنا</p>
            <a href="mailto:info@tawagood.com">info@tawagood.com</a>
          </div>
          <div class="item-img mx-3">
            <img src="../../../../assets/images/Group.png" alt="" />
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
