<section class="service my-md-4 my-3">
  <div class="w-75 mx-auto">
    <h2
      *ngIf="isInComponent"
      class="my-2"
      [ngClass]="currentLang === 'ar' ? 'text-end' : 'text-start'"
    >
      {{ "services" | translate }}
    </h2>
    <h2
      *ngIf="!isInComponent"
      class="my-2 main-color"
      [ngClass]="currentLang === 'ar' ? 'text-end' : 'text-start'"
    >
      {{ "services" | translate }}
    </h2>
    <div *ngIf="!isMobile" class="row gy-5 w-100 mx-auto">
      <div *ngFor="let item of services; let i = index" class="col-md-4">
        <div
          *ngIf="i < services.length - 1"
          class="item"
          [ngClass]="currentLang === 'ar' ? 'text-end' : 'text-start'"
        >
          <div class="item-img">
            <img
              src="../../../../assets/images/service-1.jfif"
              class="w-100"
              alt=""
            />
          </div>

          <div class="item-content mt-2">
            <h3>{{ item.name | cuttext : 3 }}</h3>
            <p class="mt-2">{{ item.content | cuttext : 20 }}</p>
            <button class="border-0">{{ "read_more" | translate }}</button>
          </div>
        </div>
      </div>

    <div
      *ngIf="isMobile && !isInComponent"
      class="row mt-3 d-md-none d-block w-100 mx-auto"
    >
      <div class="mt-2 w-100 mx-auto">
        <owl-carousel-o [options]="customOptions">
          <ng-container *ngFor="let item of services; let i = index">
            <ng-template *ngIf="i < services.length - 1" carouselSlide>
              <div
                class="item p-1"
                [ngClass]="currentLang === 'ar' ? 'text-end' : 'text-start'"
              >
                <div class="item-img">
                  <img
                    src="../../../../assets/images/service-1.jfif"
                    class="w-100"
                    alt=""
                  />
                </div>

                <div class="item-content mt-2">
                  <h3>{{ item.name | cuttext : 3 }}</h3>
                  <p class="mt-2">{{ item.content | cuttext : 15 }}</p>
                  <button class="border-0">
                    {{ "read_more" | translate }}
                  </button>
                </div>
              </div>
            </ng-template>
          </ng-container>
        </owl-carousel-o>
      </div>
    </div>
